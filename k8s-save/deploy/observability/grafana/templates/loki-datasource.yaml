apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-datasource
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: Loki
    type: loki
    uid: loki
    url: http://__NS_PREFIX__-loki-gateway.__NS_PREFIX__-observability.svc.cluster.local
    access: proxy
    jsonData:
      httpMethod: GET
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: traceId=(\w*)
          name: traceId
          url: ${__value.raw}