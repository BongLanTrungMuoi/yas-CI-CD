# httpbin — tiện ích để demo retry policy.
# Endpoint `/status/500` luôn trả HTTP 500 → retry policy sẽ tự retry 3 lần.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: httpbin
  namespace: yas-1
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: yas-1
  labels:
    app.kubernetes.io/name: httpbin
spec:
  selector:
    app.kubernetes.io/name: httpbin
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: yas-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbin
    spec:
      serviceAccountName: httpbin
      containers:
        - name: httpbin
          image: mccutchen/go-httpbin:v2.15.0
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
---
# Allow curl-client → httpbin
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-curlclient-to-httpbin
  namespace: yas-1
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbin
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/yas-1/sa/curl-client"]
---
# Retry policy cho httpbin: 3 attempts, retry on 5xx
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: httpbin-retry
  namespace: yas-1
spec:
  hosts:
    - httpbin.yas-1.svc.cluster.local
    - httpbin
  http:
    - retries:
        attempts: 3
        # 5s thay vì 2s: tránh retry storm khi VM CPU bão hòa.
        perTryTimeout: 5s
        # 5xx giữ (đề bài: retry trên 500); add gateway-error/reset cho production hardening.
        retryOn: 5xx,gateway-error,connect-failure,refused-stream,reset
      route:
        - destination:
            host: httpbin.yas-1.svc.cluster.local
      timeout: 10s
