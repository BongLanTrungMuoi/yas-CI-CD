name: backoffice-bff service staging ci

on:
  push:
    branches:
      - "rc_v*"
    paths:
      - "backoffice-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-bff-staging-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/workflows/actions

      - name: Check if service files changed
        id: check_changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          if echo "$CHANGED" | grep -qE '^backoffice-bff/|^pom\.xml|^\.github/workflows/actions/|^\.github/workflows/backoffice-bff-staging-ci\.yaml'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Maven Verify
        if: steps.check_changes.outputs.changed == 'true'
        run: mvn clean verify -f backoffice-bff

      - name: Log in to Docker Hub
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker Tag (branch name)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Build and push Docker image
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice-bff
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/yas-backoffice-bff:${{ env.DOCKER_TAG }}

      - name: Generate GitHub App Token
        if: steps.check_changes.outputs.changed == 'true'
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Update GitOps Repo (staging)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository_owner }}/yas-gitops.git
          cd yas-gitops
          yq -i '.services."backoffice-bff".tag = "${{ env.DOCKER_TAG }}"' value-staging.yaml
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add value-staging.yaml
            git commit -m "deploy(staging): update backoffice-bff image to ${{ env.DOCKER_TAG }} [skip ci]"
            git push origin main
          fi
