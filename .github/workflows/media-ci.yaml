name: media service ci

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl media -am
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Environment & Tags
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "ENV=staging" >> $GITHUB_ENV
            echo "VALUES_FILE=value-staging.yaml" >> $GITHUB_ENV
            echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
            echo "VALUES_FILE=values-dev.yaml" >> $GITHUB_ENV
            echo "DOCKER_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./media
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-media:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-media:${{ env.DOCKER_TAG }}

      #generate github app token
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Update GitOps Repo
        if: github.event_name == 'push'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository_owner }}/yas-gitops.git
          cd yas-gitops
          
          yq -i ".services.media.tag = \"${{ env.DOCKER_TAG }}\"" ${{ env.VALUES_FILE }}
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add ${{ env.VALUES_FILE }}
            git commit -m "deploy: update media to ${{ env.DOCKER_TAG }} in ${{ env.ENV }} [skip ci]"
            git push origin main
          fi

